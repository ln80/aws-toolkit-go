name: Go Tests

on:
  pull_request:
    branches:
      - "main"

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: codebuild-Test-Github-Runner-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23

      - name: Run Command
        run: |
          echo "hello world"